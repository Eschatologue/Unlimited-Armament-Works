# region Consumables
## Items

item.uaw-item-sulphur.name = Sulphur
item.uaw-item-sulphur.description = By-product of carbon processing. Can be combined with water to produce Sulphuric Acid.

item.uaw-item-anthracite.name = Anthracite
item.uaw-item-anthracite.description = Used for fuel and material synthesising. Can be found deep beneath coal veins.

item.uaw-item-cryogel.name = Cryogel
item.uaw-item-cryogel.description = A cold, gelatinous substance. Used as thermal munitions and cooling agent.

item.uaw-item-crystal-phlogiston.name = Crystal Phlogiston
item.uaw-item-crystal-phlogiston.description = A stabilised, solid-state lattice of Phlogiston acquired via crystal precipitation.

item.uaw-item-stoutsteel.name = Stoutsteel Alloy
item.uaw-item-stoutsteel.description = An exceptionally durable alloy used in vehicle construction, defence structures, and piping installation.

## Gas
liquid.uaw-liquid-phlogiston.name = Phlogiston
liquid.uaw-liquid-phlogiston.description = Volatile and highly combustible gas, utilised to power Phlogiston-based infrastructures, as well as to synthesise advanced materials

# endregion Consumables

# region Resourcing

block.uaw-hydro-thumper.name = Hydro Thumper
block.uaw-hydro-thumper.description = Injects high-pressure water deep beneath surface Coal veins, unearthing a highly potent Anthracite. \n\Must be placed centred on Coal veins.

# endregion Resourcing

