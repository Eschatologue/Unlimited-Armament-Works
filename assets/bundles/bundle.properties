# region Facilities

block.uaw-calcinator.name = Calcinator
block.uaw-calcinator.description = Subjects Coal to extreme heat to drive off impurities, leaving behind concentrated Anthracite.\n\nProduces Sulphur as by-product.

block.uaw-attrition-mill.name = Attrition Mill
block.uaw-attrition-mill.description = Uses high-velocity abrasive friction with Sand to grind Graphite into Anthracite.

block.uaw-accretion-chamber.name = Accretion Chamber
block.uaw-accretion-chamber.description = Bubbles Phlogiston through an Oil medium to precipitate solid Crystal Phlogiston onto Sand catalysts.

block.uaw-sintering-oven.name = Sintering Oven
block.uaw-sintering-oven.description = Infuses Titanium Silicon Carbide with Phlogiston into Stoutsteel Alloy.
# endregion Facilities

