# region Resourcing

block.uaw-hydro-thumper.name = Hydro Thumper
block.uaw-hydro-thumper.description = Injects high-pressure water deep beneath surface coal veins, unearthing a highly potent Anthracite. Must be placed on Coal veins.

# endregion Resourcing

